name: Unit Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {
          java-version: '21',
          distribution: 'temurin',
        }
      - run: ./gradlew test -PexcludeTests=org.esc.tasktracker.EscTaskTrackerApplicationTests