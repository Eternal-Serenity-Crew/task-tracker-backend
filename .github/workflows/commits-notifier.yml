name: commits-notifier.yml
on: [ push ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Count commits
        id: count
        run: |
          echo "count=$(jq <<<'${{ toJSON(github.event.commits) }}' | jq length)" >> $GITHUB_OUTPUT
          echo "commits=$(jq -r '.[].message | "\u2022 \(. | split("\n")[0])"' <<<'${{ toJSON(github.event.commits) }}')" >> $GITHUB_OUTPUT

      - name: Send TG message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            ${{ github.actor }} has pushed ${{ steps.count.outputs.count }} commits to ${{ github.ref_name }}

            ${{ steps.count.outputs.commits }}

            🔗 ${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}