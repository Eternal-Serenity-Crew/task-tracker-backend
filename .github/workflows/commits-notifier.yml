name: Create commits notification
on: [ push ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare commit message
        id: prepare
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: |
          COUNT=$(echo "$COMMITS_JSON" | jq length)
          
          COMMIT_LIST=$(echo "$COMMITS_JSON" | \
          jq -r '.[] | "- " + (."message" | split("\n")[0])' | \
          tr '\n' '\\n' | sed 's/\\\\n/\\n/g')
          
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "commit_list=$COMMIT_LIST" >> $GITHUB_OUTPUT

      - name: Send TG message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.CHAT_ID }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            ${{ github.actor }} has pushed ${{ steps.count.outputs.count }} commit(-s) to ${{ github.ref_name }}
            
            ${{ steps.count.outputs.commits }}
            
            🔗 ${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}