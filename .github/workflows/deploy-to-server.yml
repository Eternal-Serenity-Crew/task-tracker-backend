name: Deploy esc-task-tracker
on:
  repository_dispatch:
    types: [ new-image-published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия образа (по умолчанию latest)'
        required: false
        default: 'latest'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH key
        run: |
          echo '${{ secrets.SERVER_SSH_KEY }}' > key.pem
          chmod 600 key.pem

      - name: Test SSH connection
        run: ssh -i key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 22 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "echo '✅ SSH работает!'"

      - name: Deploy esc-task-tracker
        run: ssh -i key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 22 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} "cd ~/esc-task-tracker && cp .env .env.backup.\$(date +%Y%m%d_%H%M%S) || true && sed -i 's|scobca/task-tracker:[^ ]*|scobca/task-tracker:${{ steps.version.outputs.version }}|' docker-compose.yaml && docker-compose pull esc-task-tracker && docker-compose stop esc-task-tracker && docker-compose up -d --force-recreate esc-task-tracker && sleep 15 && if docker-compose ps esc-task-tracker | grep -q 'Up'; then echo '✅ Deployed v${{ steps.version.outputs.version }}'; else echo '❌ Failed'; exit 1; fi && docker-compose logs --tail=10 esc-task-tracker"
